<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Ranker Elite</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2e; --accent: #38bdf8; --star: #fbbf24; --text: #f1f5f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-weight: 800; }
        p.subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        
        #game-list { list-style: none; padding: 0; }
        .game-item { 
            background: var(--card); margin-bottom: 12px; padding: 16px; 
            border-radius: 16px; display: flex; align-items: center; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid #1e293b;
        }
        .rank { font-weight: 900; font-size: 1.4rem; margin-right: 15px; color: var(--accent); min-width: 35px; }
        .game-info { flex-grow: 1; }
        .game-title { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .rating-display { color: var(--star); font-size: 0.9rem; font-weight: 800; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 6px; }
        
        .delete-btn { background: #1e293b; color: #475569; border: none; border-radius: 10px; width: 32px; height: 32px; margin-left: 10px; font-size: 1.2rem; }

        /* Modal / Slider System */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--card); padding: 24px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid #334155; text-align: center; }
        
        .big-rating { font-size: 4rem; font-weight: 900; color: var(--star); margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        /* Custom Slider Styling */
        input[type=range] {
            width: 100%; -webkit-appearance: none; background: transparent; margin: 20px 0;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 12px; cursor: pointer; background: #1e293b; border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 28px; width: 28px; border-radius: 50%; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -8px; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        textarea { 
            width: 100%; height: 140px; background: #0b0f1a; color: white; border: 1px solid #334155; border-radius: 12px; padding: 12px; margin-top: 15px; box-sizing: border-box; font-size: 16px;
        }
        
        button { border: none; padding: 14px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .save-btn { background: var(--accent); color: #0b0f1a; width: 100%; margin-top: 20px; font-size: 1rem; }
        .add-btn { background: #10b981; color: white; width: 100%; margin-bottom: 15px; font-size: 1rem; }
        .close-btn { background: transparent; color: #64748b; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Master Rankings</h1>
    <p class="subtitle">Drag to rank. Tap for precision scoring.</p>
    
    <button class="add-btn" onclick="addNewGame()">+ Add New Game</button>
    <ul id="game-list"></ul>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin:0; font-size: 1.2rem; color: #94a3b8;">Rating</h2>
            <div id="rating-num" class="big-rating">0.0</div>
            
            <input type="range" id="rating-slider" min="0" max="10" step="0.1" value="0" oninput="updateRatingLabel(this.value)">

            <textarea id="review-text" placeholder="Your thoughts..."></textarea>
            
            <button class="save-btn" onclick="saveReview()">Save Review</button>
            <button class="close-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let games = JSON.parse(localStorage.getItem('myGames')) || [];
        let currentEditingId = null;

        const list = document.getElementById('game-list');
        const modal = document.getElementById('modal');

        function render() {
            list.innerHTML = '';
            games.forEach((game, index) => {
                const li = document.createElement('li');
                li.className = 'game-item';
                li.setAttribute('data-id', game.id);
                
                // Ensure rating displays one decimal place
                const score = parseFloat(game.rating || 0).toFixed(1);
                
                li.innerHTML = `
                    <div class="rank">${index + 1}</div>
                    <div class="game-info" onclick="openReview('${game.id}')">
                        <span class="game-title">${game.title}</span>
                        <span class="rating-display">★ ${score}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteGame('${game.id}', event)">×</button>
                `;
                list.appendChild(li);
            });
            localStorage.setItem('myGames', JSON.stringify(games));
        }

        function updateRatingLabel(val) {
            document.getElementById('rating-num').innerText = parseFloat(val).toFixed(1);
        }

        new Sortable(list, {
            animation: 200,
            onEnd: function() {
                const newOrder = Array.from(list.children).map(li => li.getAttribute('data-id'));
                games = newOrder.map(id => games.find(g => g.id === id));
                render();
            }
        });

        function addNewGame() {
            const title = prompt("Game Title:");
            if (title) {
                games.push({ id: Date.now().toString(), title, review: "", rating: 0 });
                render();
            }
        }

        function deleteGame(id, event) {
            event.stopPropagation();
            if (confirm("Delete this entry?")) {
                games = games.filter(g => g.id !== id);
                render();
            }
        }

        function openReview(id) {
            currentEditingId = id;
            const game = games.find(g => g.id === id);
            document.getElementById('modal-title').innerText = game.title;
            document.getElementById('review-text').value = game.review;
            
            const rating = parseFloat(game.rating || 0).toFixed(1);
            document.getElementById('rating-slider').value = rating;
            document.getElementById('rating-num').innerText = rating;
            
            modal.style.display = 'flex';
        }

        function saveReview() {
            const game = games.find(g => g.id === currentEditingId);
            game.review = document.getElementById('review-text').value;
            game.rating = document.getElementById('rating-slider').value;
            closeModal();
            render();
        }

        function closeModal() { modal.style.display = 'none'; }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        render();
    </script>
</body>
</html>
