<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Ranker Elite</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2e; --accent: #38bdf8; --star: #fbbf24; --text: #f1f5f9; --ui: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-weight: 800; }
        p.subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        
        #game-list { list-style: none; padding: 0; margin: 0; }
        .game-item { 
            background: var(--card); margin-bottom: 12px; padding: 12px 16px; 
            border-radius: 18px; display: flex; align-items: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 1px solid #1e293b;
            touch-action: pan-y; /* Crucial for smooth scrolling */
        }
        
        .rank { font-weight: 900; font-size: 1.3rem; margin-right: 15px; color: var(--accent); min-width: 30px; text-align: center; }
        
        /* The main tap area for reviews */
        .game-info { flex-grow: 1; padding: 5px 0; }
        .game-title { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 2px; }
        .rating-display { color: var(--star); font-size: 0.85rem; font-weight: 800; }

        /* The Control Zone on the right */
        .controls { display: flex; align-items: center; gap: 15px; margin-left: 10px; border-left: 1px solid #2d3748; padding-left: 15px; }
        
        .drag-handle { 
            font-size: 1.5rem; color: #475569; cursor: grab; padding: 10px 5px;
            user-select: none; -webkit-user-select: none;
        }
        
        .delete-btn { 
            color: #ef4444; font-size: 1.2rem; font-weight: bold; background: none; border: none; padding: 10px 5px;
        }

        /* Modal styling */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); padding: 20px; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--card); padding: 24px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid #334155; text-align: center; }
        .big-rating { font-size: 4.5rem; font-weight: 900; color: var(--star); margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; margin: 25px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 10px; background: #1e293b; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 30px; width: 30px; border-radius: 50%; background: var(--accent); -webkit-appearance: none; margin-top: -10px; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

        textarea { width: 100%; height: 160px; background: #0b0f1a; color: white; border: 1px solid #334155; border-radius: 14px; padding: 14px; margin-top: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        button.action { border: none; padding: 16px 20px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; }
        .save-btn { background: var(--accent); color: #0b0f1a; margin-top: 20px; }
        .add-btn { background: #10b981; color: white; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .close-btn { background: transparent; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Game Ranking</h1>
    <p class="subtitle">Use ≡ to drag. Tap name to review.</p>
    
    <button class="action add-btn" onclick="addNewGame()">+ Add New Game</button>
    <ul id="game-list"></ul>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin:0; font-size: 1.1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Rating</h2>
            <div id="rating-num" class="big-rating">0.0</div>
            <input type="range" id="rating-slider" min="0" max="10" step="0.1" value="0" oninput="updateRatingLabel(this.value)">
            <textarea id="review-text" placeholder="Add your thoughts..."></textarea>
            <button class="action save-btn" onclick="saveReview()">Save Review</button>
            <button class="action close-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let games = JSON.parse(localStorage.getItem('myGames')) || [];
        let currentEditingId = null;

        const list = document.getElementById('game-list');
        const modal = document.getElementById('modal');

        function render() {
            list.innerHTML = '';
            games.forEach((game, index) => {
                const li = document.createElement('li');
                li.className = 'game-item';
                li.setAttribute('data-id', game.id);
                
                const score = parseFloat(game.rating || 0).toFixed(1);
                
                li.innerHTML = `
                    <div class="rank">${index + 1}</div>
                    <div class="game-info" onclick="openReview('${game.id}')">
                        <span class="game-title">${game.title}</span>
                        <span class="rating-display">★ ${score}</span>
                    </div>
                    <div class="controls">
                        <button class="delete-btn" onclick="deleteGame('${game.id}', event)">×</button>
                        <div class="drag-handle">≡</div>
                    </div>
                `;
                list.appendChild(li);
            });
            localStorage.setItem('myGames', JSON.stringify(games));
        }

        function updateRatingLabel(val) {
            document.getElementById('rating-num').innerText = parseFloat(val).toFixed(1);
        }

        // Initialize Sortable with a HANDLE
        new Sortable(list, {
            handle: '.drag-handle', // This restricts dragging ONLY to the pancake icon
            animation: 250,
            ghostClass: 'sortable-ghost',
            onEnd: function() {
                const newOrder = Array.from(list.children).map(li => li.getAttribute('data-id'));
                games = newOrder.map(id => games.find(g => g.id === id));
                render();
            }
        });

        function addNewGame() {
            const title = prompt("Game Title:");
            if (title) {
                games.push({ id: Date.now().toString(), title, review: "", rating: 0 });
                render();
            }
        }

        function deleteGame(id, event) {
            event.stopPropagation();
            if (confirm("Delete this entry?")) {
                games = games.filter(g => g.id !== id);
                render();
            }
        }

        function openReview(id) {
            currentEditingId = id;
            const game = games.find(g => g.id === id);
            document.getElementById('modal-title').innerText = game.title;
            document.getElementById('review-text').value = game.review;
            const rating = parseFloat(game.rating || 0).toFixed(1);
            document.getElementById('rating-slider').value = rating;
            document.getElementById('rating-num').innerText = rating;
            modal.style.display = 'flex';
        }

        function saveReview() {
            const game = games.find(g => g.id === currentEditingId);
            game.review = document.getElementById('review-text').value;
            game.rating = document.getElementById('rating-slider').value;
            closeModal();
            render();
        }

        function closeModal() { modal.style.display = 'none'; }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        render();
    </script>
</body>
</html>
