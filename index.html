<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Journal Ultimate</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161e2e; --accent: #38bdf8; 
            --star: #fbbf24; --text: #f1f5f9; --ui: #1e293b; --danger: #ef4444; --backlog: #10b981;
        }
        [data-theme="midnight"] { --bg: #000; --card: #111; --accent: #a855f7; --ui: #1f1f1f; }
        [data-theme="crimson"] { --bg: #1a0b0b; --card: #2e1616; --accent: #f87171; --ui: #3b1e1e; }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: background 0.3s; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--accent); font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; }
        .settings-icon { font-size: 1.4rem; cursor: pointer; background: var(--card); padding: 8px; border-radius: 12px; border: 1px solid var(--ui); }

        /* TABS */
        .tab-content { display: none; animation: fadeIn 0.2s ease-in; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); 
            display: flex; justify-content: space-around; padding: 12px 0; 
            border-top: 1px solid var(--ui); z-index: 1000; padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .nav-item { color: #64748b; font-weight: 700; font-size: 0.75rem; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 2px; }

        /* LISTS */
        .game-list { list-style: none; padding: 0; margin: 0; }
        .game-item { 
            background: var(--card); margin-bottom: 12px; padding: 14px 16px; 
            border-radius: 18px; display: flex; align-items: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 1px solid var(--ui);
        }
        .rank { font-weight: 900; font-size: 1.2rem; margin-right: 15px; color: var(--accent); min-width: 25px; text-align: center; }
        .game-info { flex-grow: 1; }
        .game-title { font-weight: 700; font-size: 1.05rem; display: block; }
        .game-meta { font-size: 0.8rem; color: #64748b; margin-top: 2px; font-weight: 600; }
        .controls { display: flex; align-items: center; gap: 12px; margin-left: 10px; border-left: 1px solid var(--ui); padding-left: 15px; }
        .drag-handle { font-size: 1.5rem; color: #475569; padding: 5px; cursor: grab; }

        /* STATS PAGE */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--ui); text-align: center; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
        .stat-label { font-size: 0.7rem; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: var(--bg); padding: 25px; z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal.active { display: flex; }
        .big-rating { font-size: 4rem; font-weight: 900; color: var(--star); text-align: center; margin: 10px 0; font-variant-numeric: tabular-nums; }

        input, textarea, select { width: 100%; background: var(--ui); color: white; border: 1px solid #334155; border-radius: 14px; padding: 14px; margin-top: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        button.primary { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 800; width: 100%; margin-top: 20px; font-size: 1rem; cursor: pointer; }
        button.secondary { background: transparent; color: #64748b; border: 1px solid var(--ui); padding: 12px; border-radius: 12px; margin-top: 10px; width: 100%; font-weight: 600; cursor: pointer; }
        .finish-btn { background: var(--backlog) !important; color: white !important; }
    </style>
</head>
<body data-theme="default">

    <div class="header">
        <h1 id="page-title">RANKINGS</h1>
        <div class="settings-icon" onclick="openSettings()">⚙️</div>
    </div>

    <div id="tab-ranked" class="tab-content active">
        <button class="primary" style="margin-bottom:20px; margin-top:0; background:var(--accent);" onclick="addNew('ranked')">+ Add Ranked Game</button>
        <ul id="list-ranked" class="game-list"></ul>
    </div>

    <div id="tab-backlog" class="tab-content">
        <button class="primary" style="margin-bottom:20px; margin-top:0; background:var(--backlog); color:white;" onclick="addNew('backlog')">+ Add to Backlog</button>
        <ul id="list-backlog" class="game-list"></ul>
    </div>

    <div id="tab-stats" class="tab-content">
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="stat-total">0</span><span class="stat-label">Ranked</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-avg">0.0</span><span class="stat-label">Avg Rating</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-hours">0</span><span class="stat-label">Total Hours</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-top">0</span><span class="stat-label">9.0+ Scores</span></div>
            <div class="stat-card" style="grid-column: span 2;">
                <span class="stat-val" id="stat-rate">0%</span><span class="stat-label">Completion Rate (Ranked vs Backlog)</span>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('ranked', this)"><span class="nav-icon">🏆</span>Ranked</div>
        <div class="nav-item" onclick="switchTab('backlog', this)"><span class="nav-icon">⏳</span>Backlog</div>
        <div class="nav-item" onclick="switchTab('stats', this)"><span class="nav-icon">📊</span>Stats</div>
    </nav>

    <div id="modal-review" class="modal">
        <h2 id="m-title" style="text-align:center; margin:0; color:var(--accent);">Title</h2>
        <div id="rating-section">
            <div id="m-rating-num" class="big-rating">0.0</div>
            <input type="range" id="m-slider" min="0" max="10" step="0.1" value="0" oninput="document.getElementById('m-rating-num').innerText = parseFloat(this.value).toFixed(1)">
            <input type="number" id="m-hours" placeholder="Total hours played...">
        </div>
        <textarea id="m-text" placeholder="Review or backlog notes..."></textarea>
        <button class="primary" onclick="saveGame()">Save Changes</button>
        <button id="m-upgrade" class="primary finish-btn" style="display:none;" onclick="moveBacklogToRanked()">Mark as Finished 🏆</button>
        <button class="secondary" style="color:var(--danger);" onclick="deleteGame()">Delete Game</button>
        <button class="secondary" onclick="closeModals()">Cancel</button>
    </div>

    <div id="modal-settings" class="modal">
        <h2 style="color:var(--accent);">Settings</h2>
        <select onchange="setTheme(this.value)" id="theme-sel">
            <option value="default">Classic Blue</option>
            <option value="midnight">Midnight Purple</option>
            <option value="crimson">Crimson Red</option>
        </select>
        <button class="primary" onclick="exportData()">💾 Backup Data (.json)</button>
        <button class="secondary" onclick="document.getElementById('imp').click()">📂 Restore Data</button>
        <input type="file" id="imp" style="display:none" onchange="importData(event)">
        <div style="flex-grow:1"></div>
        <button class="primary" onclick="closeModals()">Done</button>
    </div>

    <script>
        let ranked = JSON.parse(localStorage.getItem('myGames')) || [];
        let backlog = JSON.parse(localStorage.getItem('myBacklog')) || [];
        let editId = null; let isEditingRanked = true;

        function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('appTheme', t); }
        setTheme(localStorage.getItem('appTheme') || 'default');

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            el.classList.add('active');
            document.getElementById('page-title').innerText = t.toUpperCase();
            if(t === 'stats') updateStats();
        }

        function updateStats() {
            const total = ranked.length;
            const avg = total ? (ranked.reduce((s, g) => s + parseFloat(g.rating), 0) / total).toFixed(1) : "0.0";
            const hrs = ranked.reduce((s, g) => s + (parseFloat(g.hours) || 0), 0);
            const masterpieces = ranked.filter(g => parseFloat(g.rating) >= 9).length;
            const rate = (total + backlog.length) ? Math.round((total / (total + backlog.length)) * 100) : 0;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-avg').innerText = avg;
            document.getElementById('stat-hours').innerText = hrs.toLocaleString();
            document.getElementById('stat-top').innerText = masterpieces;
            document.getElementById('stat-rate').innerText = rate + "%";
        }

        function render() {
            const rList = document.getElementById('list-ranked');
            const bList = document.getElementById('list-backlog');
            rList.innerHTML = ''; bList.innerHTML = '';
            ranked.forEach((g, i) => {
                rList.innerHTML += `<li class="game-item" data-id="${g.id}"><div class="rank">${i+1}</div><div class="game-info" onclick="openReview('${g.id}', true)"><span class="game-title">${g.title}</span><div class="game-meta"><span style="color:var(--star)">★ ${parseFloat(g.rating).toFixed(1)}</span> • ${g.hours || 0}h</div></div><div class="controls"><div class="drag-handle">≡</div></div></li>`;
            });
            backlog.forEach((g, i) => {
                bList.innerHTML += `<li class="game-item" data-id="${g.id}"><div class="rank">${i+1}</div><div class="game-info" onclick="openReview('${g.id}', false)"><span class="game-title">${g.title}</span><div class="game-meta">Notes written ✓</div></div><div class="controls"><div class="drag-handle">≡</div></div></li>`;
            });
            localStorage.setItem('myGames', JSON.stringify(ranked));
            localStorage.setItem('myBacklog', JSON.stringify(backlog));
        }

        function openReview(id, isR) {
            editId = id; isEditingRanked = isR;
            const g = (isR ? ranked : backlog).find(x => x.id === id);
            document.getElementById('m-title').innerText = g.title;
            document.getElementById('m-text').value = g.review || "";
            document.getElementById('rating-section').style.display = isR ? 'block' : 'none';
            document.getElementById('m-upgrade').style.display = isR ? 'none' : 'block';
            if(isR) {
                document.getElementById('m-slider').value = g.rating || 0;
                document.getElementById('m-rating-num').innerText = parseFloat(g.rating || 0).toFixed(1);
                document.getElementById('m-hours').value = g.hours || "";
            }
            document.getElementById('modal-review').classList.add('active');
        }

        function saveGame() {
            const g = (isEditingRanked ? ranked : backlog).find(x => x.id === editId);
            g.review = document.getElementById('m-text').value;
            if(isEditingRanked) { g.rating = document.getElementById('m-slider').value; g.hours = document.getElementById('m-hours').value; }
            closeModals(); render();
        }

        function moveBacklogToRanked() {
            const idx = backlog.findIndex(x => x.id === editId);
            const g = backlog.splice(idx, 1)[0];
            g.rating = 0; g.hours = "";
            ranked.push(g); closeModals(); render(); openReview(g.id, true);
        }

        function addNew(type) {
            const t = prompt("Game Title:"); if(!t) return;
            const newG = { id: Date.now().toString(), title: t, review: "", rating: 0, hours: "" };
            if(type === 'ranked') ranked.push(newG); else backlog.push(newG);
            render();
        }

        function deleteGame() {
            if(!confirm("Delete this game?")) return;
            if(isEditingRanked) ranked = ranked.filter(x => x.id !== editId);
            else backlog = backlog.filter(x => x.id !== editId);
            closeModals(); render();
        }

        function openSettings() { document.getElementById('modal-settings').classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function exportData() {
            const blob = new Blob([JSON.stringify({r: ranked, b: backlog})], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'GameJournal_Backup.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const d = JSON.parse(f.target.result);
                ranked = d.r || []; backlog = d.b || [];
                render();
            };
            reader.readAsText(e.target.files[0]);
        }

        new Sortable(document.getElementById('list-ranked'), { handle: '.drag-handle', animation: 200, onEnd: () => {
            const order = Array.from(document.getElementById('list-ranked').children).map(li => li.getAttribute('data-id'));
            ranked = order.map(id => ranked.find(g => g.id === id));
            render();
        }});

        new Sortable(document.getElementById('list-backlog'), { handle: '.drag-handle', animation: 200, onEnd: () => {
            const order = Array.from(document.getElementById('list-backlog').children).map(li => li.getAttribute('data-id'));
            backlog = order.map(id => backlog.find(g => g.id === id));
            render();
        }});

        render();
    </script>
</body>
</html>
